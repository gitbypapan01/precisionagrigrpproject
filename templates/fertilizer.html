{% extends 'base.html' %} {% block title %} Fertilizer {% endblock title %} {% block body %}

<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <style>
        .hero-image {
            background-image: linear-gradient(rgba(18, 20, 18, 0.65), rgba(18, 20, 18, 0.65)), url("/static/scripts/images/4.jpeg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            border-bottom: 3px solid #2c5e3b;
        }

        body.dark-mode .hero-image {
            background-image: linear-gradient(rgba(18, 20, 18, 0.8), rgba(18, 20, 18, 0.8)), url("/static/scripts/images/4.jpeg");
            border-bottom-color: #81c784;
        }
        
        .hero-text {
            color: white;
            max-width: 800px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .text-colors {
            color: #7dcaf3;
        }
        
        .btn-info {
            background-color: #7dcaf3;
            border-color: #fff;
        }
        
        #myBtn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 100px;
            z-index: 999;
            font-size: 10px;
            border: none;
            outline: none;
            background-color: #7dcaf3;
            color: white;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
        }
        
        .aboutimg {
            width: 100%;
            height: 500px !important;
        }
    </style>
</head>

<body>

    <!--About us section-->
    <div class="hero-image">
        <div class="hero-text">
            <p class="breadcrumbs text-white" style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.95rem; letter-spacing: 0.5px; opacity: 0.9;">
                <span class="mr-2"><a href="{{ url_for('hello_world') }}" class="text-white" style="text-decoration: none;">Home /</a></span>
                <span>Fertilizer</span>
            </p>
            <h1 class="mb-0 bread" style="font-family: 'Inter', sans-serif; font-weight: 800; font-size: 2.5rem; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.15);">Get informed advice based on fertilizer based on soil</h1>
        </div>
    </div>
    <!--/About us section-->

    <!-- form section  -->
    <div class="container p-4">
        <form class="text-uppercase font-weight-bold" method="POST" action="{{ url_for('fert_recommend')}}">
            <div class="form-group">
                <label for="exampleInputEmail1">Nitrogen</label>
                <input type="number" class="form-control" name="nitrogen" id="Nitrogen" aria-describedby="emailHelp" placeholder="Enter the value">
            </div>

            <div class="form-group">
                <label for="exampleInputEmail1">Phosphorous</label>
                <input type="number" class="form-control" name="phosphorous" id="Phosphorous" aria-describedby="emailHelp" placeholder="Enter the value">
            </div>

            <div class="form-group">
                <label for="exampleInputEmail1">Pottasium</label>
                <input type="number" class="form-control" name="pottasium" id="Pottasium" aria-describedby="emailHelp" placeholder="Enter the value">
            </div>

            <div class="form-group">
                <label for="exampleInputEmail1">Crop want to grow</label>
                <select class="form-control form-control-sm" name="cropname" id="crop">
                    <option>Select</option>
                    <option>rice</option>
                    <option>maize</option>
                    <option>chickpea</option>
                    <option>kidneybeans</option>
                    <option>pigeonpeas</option>
                    <option>mothbeans</option>
                    <option>mungbean</option>
                    <option>blackgram</option>
                    <option>lentil</option>
                    <option>pomegranate</option>
                    <option>banana</option>
                    <option>mango</option>
                    <option>grapes</option>
                    <option>watermelon</option>
                    <option>muskmelon</option>
                    <option>apple</option>
                    <option>orange</option>
                    <option>papaya</option>
                    <option>coconut</option>
                    <option>cotton</option>
                    <option>jute</option>
                    <option>coffee</option>

                </select>
            </div>


            <div class="col-md-12 text-center">
                <button type="submit" class="btn btn-dark bg-dark btn-lg">Predict</button>
            </div>
        </form>
    </div>


    <!-- footer section start-->

    <footer class="page-footer font-small blue pt-5">
        <!-- Copyright -->
        <div class="footer-copyright text-center py-3 bg-dark text-light p-2" style="background-image: url(https://images.pexels.com/photos/5980/food-sunset-love-field.jpg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940);background-size: cover; height: 100px; background-position: center; position:center;">
            <h5> © 2026 Copyright: Precision Agriculture Using Machine Learning 
                <div class="text-center text-white text-uppercase font-weight-bold">Go Green....</div>
            </h5>
        </div>

        <!-- Copyright -->
    </footer>

    <!-- footer section end -->


</body>
</html>
{% endblock body %}
