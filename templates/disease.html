{% extends 'base.html' %} {% block title %} Disease {% endblock title %} {% block body %}

<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <style>
        .hero-image {
            background-image: linear-gradient(rgba(18, 20, 18, 0.65), rgba(18, 20, 18, 0.65)), url("/static/scripts/images/4.jpeg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            border-bottom: 3px solid #2c5e3b;
        }

        body.dark-mode .hero-image {
            background-image: linear-gradient(rgba(18, 20, 18, 0.8), rgba(18, 20, 18, 0.8)), url("/static/scripts/images/4.jpeg");
            border-bottom-color: #81c784;
        }

        .backgr-image {
            background-image: linear-gradient(rgba(0, 0, 0.1, 0.1), rgba(0, 0, 0.1, 0.1)), url("/static/scripts/images/1.jpeg");
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            margin-top: 20px;
            margin-bottom: 20px;
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .hero-text {
            color: white;
            max-width: 800px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .text-colors {
            color: #7dcaf3;
        }

        .btn-info {
            background-color: #7dcaf3;
            border-color: #fff;
        }

        #myBtn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 100px;
            z-index: 999;
            font-size: 10px;
            border: none;
            outline: none;
            background-color: #7dcaf3;
            color: white;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
        }

        .aboutimg {
            width: 100%;
            height: 500px !important;
        }

        #output-image {
            width: 300px;
            height: 400px;
        }
    </style>
</head>

<body>

    <!--About us section-->
    <div class="hero-image">
        <div class="hero-text">
            <p class="breadcrumbs text-white"
                style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.95rem; letter-spacing: 0.5px; opacity: 0.9;">
                <span class="mr-2"><a href="{{ url_for('hello_world') }}" class="text-white"
                        style="text-decoration: none;">Home /</a></span>
                <span>Disease</span>
            </p>
            <h1 class="mb-0 bread"
                style="font-family: 'Inter', sans-serif; font-weight: 800; font-size: 2.5rem; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.15);">
                FIND OUT THE DISEASE OF YOUR PLANT BY ITS LEAVES</h1>
        </div>
    </div>
    <!--/About us section-->


    <!-- form section  -->
    <div class="form-section-wrapper" style="padding: 40px 0;">
        <h2 class="text-center m-4">Please upload the image</h2>

        <form class="form-signin" method=post enctype=multipart/form-data>
            <div class="mx-auto text-center" style="width: 100%; max-width: 600px;">
                <input type="file" name="file" id="inputfile" onchange="preview_image(event)" class="form-control-file d-inline-block">
                <br>
                <br>
                <img id="output-image" class="rounded mx-auto d-block" src="{{ url_for('static', filename='scripts/images/placeholder.png') }}" style="background-color: #f8f9fa; border: 2px dashed #ccc; border-radius: 8px; object-fit: contain; width: 100%; height: 400px; padding: 20px;" />
                <button type="submit" class="btn btn-dark p-2 m-3 btn-lg">Predict</button>
            </div>
        </form>
    </div>

    <script type="text/javascript">
        function preview_image(event) {
            var reader = new FileReader();
            reader.onload = function () {
                var output = document.getElementById('output-image')
                output.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>


    <!-- footer section start-->

    <footer class="page-footer font-small blue pt-5">
        <!-- Copyright -->
        <div class="footer-copyright text-center py-3 bg-dark text-light p-2"
            style="background-image: url(https://images.pexels.com/photos/5980/food-sunset-love-field.jpg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940);background-size: cover; height: 100px; background-position: center; position:center;">
            <h5> © 2026 Copyright: Precision Agriculture Using Machine Learning
                <div class="text-center text-white text-uppercase font-weight-bold">Go Green....</div>
            </h5>
        </div>

        <!-- Copyright -->
    </footer>

    <!-- footer section end -->



</body>

</html>
{% endblock body %}
